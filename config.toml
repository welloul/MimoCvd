# CVDTrader Configuration
# Low-latency Rust trading bot for Hyperliquid

[exchange]
name = "hyperliquid"
ws_url = "wss://api.hyperliquid.xyz/ws"
api_url = "https://api.hyperliquid.xyz"
symbols = ["ZEC", "SUI", "SOL", "TAO", "DOGE", "XMR", "ARB", "HYPE", "AVAX"]

[strategy]
name = "cvd_poc"
lookback = 20
cvd_exhaustion_ratio = 0.70
cvd_absorption_pctile = 0.90
sl_offset = 2
risk_r_multiple = 1.5
entry_offset_pct = 0.001  # 0.1%

[risk]
max_position_usd = 1000.0
max_leverage = 10.0
max_drawdown_pct = 0.05  # 5%
circuit_breaker_latency_ms = 500
circuit_breaker_failures = 3
account_balance = 10000.0  # Used in dryrun mode; in live/testnet, fetched from exchange

[execution]
mode = "DryRun"  # DryRun, testnet, live
ttl_seconds = 120
post_only = true
ttl_check_interval_secs = 10  # How often to check for expired orders

[bot]
trade_buffer_size = 1000  # Channel buffer size for trade messages
candle_buffer_size = 100  # Channel buffer size for candle messages
health_check_port = 8080  # Port for health check HTTP endpoint (0 to disable)

[logging]
level = "debug"  # trace, debug, info, warn, error
format = "json"  # json, pretty
